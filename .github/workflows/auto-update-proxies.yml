name: Auto-Update Proxies

on:
  schedule:
    # Запуск каждые 30 минут
    - cron: '*/30 * * * *'
  workflow_dispatch:  # Ручной запуск

jobs:
  update-proxies:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Collect fresh proxies
        run: |
          python -c "
          from fp import FreeProxy
          import json
          
          fp = FreeProxy(timeout=5.0, rand=True)
          proxies = fp.get(count=1000)
          
          with open('proxies.json', 'w') as f:
              json.dump({'proxies': proxies, 'updated': '__import__(\"datetime\").datetime.utcnow().isoformat()'}, f, indent=2)
          "
      
      - name: Check for changes
        id: git-check
        run: |
          git diff --quiet proxies.json || echo "has_changes=true" >> $GITHUB_OUTPUT
      
      - name: Commit and push if changed
        if: steps.git-check.outputs.has_changes == 'true'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add proxies.json
          git commit -m "chore: auto-update proxy list [skip ci]"
          git push
      
      - name: Create artifact
        uses: actions/upload-artifact@v4
        with:
          name: proxy-list
          path: proxies.json
          retention-days: 7
